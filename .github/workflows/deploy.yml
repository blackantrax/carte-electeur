name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-security-blocking

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Run database migrations
        run: php artisan migrate --force
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_CONNECTION: mysql
          DB_HOST: bodfqn7lxwjbgroabdkh-mysql.services.clever-cloud.com
          DB_PORT: "3306"
          DB_DATABASE: bodfqn7lxwjbgroabdkh
          DB_USERNAME: uhxr4kvdkp5n2ksh
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_ENV: production

      - name: Prepare clean deploy (sans .git pour eviter le blocage Vercel)
        run: |
          mkdir -p /tmp/vercel-deploy
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='.env' . /tmp/vercel-deploy/
          cp -f .vercel/project.json /tmp/vercel-deploy/.vercel/project.json 2>/dev/null || true

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: /tmp/vercel-deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
