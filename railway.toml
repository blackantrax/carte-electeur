[build]
builder = "nixpacks"

[deploy]
preDeployCommand = "php artisan db:wipe --force && php artisan migrate --force"
startCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT public/index.php"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
